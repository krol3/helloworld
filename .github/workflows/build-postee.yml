name: build-postee
on:
  workflow_dispatch:
env:
  ORGANIZATION: krol
  APP: helloworld
jobs:
  build:
    name: Build
    runs-on: ubuntu-18.04
    steps:
      - name: Checkout code
        uses: actions/checkout@v2

      - name: Build an image from Dockerfile
        run: |
          docker build -t docker.io/${{ env.ORGANIZATION }}/${{ env.APP }}:${{ github.sha }} .

      - name: Run Trivy vulnerability scanner
        id: trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'docker.io/${{ env.ORGANIZATION }}/${{ env.APP }}:${{ github.sha }}'
          format: 'json'
          exit-code: '0'
          ignore-unfixed: false
          vuln-type: 'os,library'
          severity: 'CRITICAL,HIGH'
          output: 'trivy-results.json'

      - name: Slack Notification
        env:
          POSTEE: '{{ secrets.POSTEE_SERVER }}'
        run: |
          RESULTS="$(cat trivy-results.json)"
          /usr/bin/curl -s -H 'Content-Type: application/json' -d "$RESULTS" "$POSTEE"
        # localhost:8082